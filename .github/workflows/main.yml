name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘন্টায় update
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Optional: generate activity graph (if using github-readme-activity-graph)
      - name: Generate Contribution Graph
        uses: ar7d/github-readme-activity-graph@v2
        with:
          username: Sheikh-Rabby
          theme: react-dark
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update activity graph" || echo "No changes to commit"
          git push
